name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MODELROUTER_USE_FIXTURES: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run validate-schemas
      - run: npm run lint:cursor-denylist
      - run: npm run build
      - run: npm test
      - run: npm run smoke
      - run: npm pack --dry-run
      - run: npm run pack-smoke
